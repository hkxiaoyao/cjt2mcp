<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}畅捷通 MCP 后台{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
           background: #f5f6f8; color: #1f2329; font-size: 14px; }
    a { color: #2f6fed; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 200px; background: #1f2329; color: #cfd3dc; padding: 20px 0; flex-shrink: 0; }
    .sidebar h1 { font-size: 15px; color: #fff; padding: 0 20px 16px; margin: 0;
                  border-bottom: 1px solid #333842; }
    .sidebar nav a { display: block; padding: 10px 20px; color: #cfd3dc; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #2b303a; color: #fff; text-decoration: none; }
    .main { flex: 1; padding: 24px 32px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .topbar .user { color: #646a73; font-size: 13px; }
    .btn { display: inline-block; padding: 7px 14px; border-radius: 6px; border: 1px solid #d0d3d9;
           background: #fff; cursor: pointer; font-size: 13px; color: #1f2329; }
    .btn:hover { border-color: #2f6fed; color: #2f6fed; text-decoration: none; }
    .btn-primary { background: #2f6fed; border-color: #2f6fed; color: #fff; }
    .btn-primary:hover { background: #245ad4; color: #fff; }
    .btn-danger { color: #d83931; border-color: #f0c2c0; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid #eef0f3; }
    th { background: #fafbfc; color: #646a73; font-weight: 500; }
    .card { background: #fff; border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .tag-ok { background: #e8f5e9; color: #2e7d32; }
    .tag-warn { background: #fff4e5; color: #b26a00; }
    .tag-off { background: #f0f1f3; color: #8a8f99; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; margin-bottom: 6px; color: #1f2329; }
    .form-row .req { color: #d83931; }
    .form-row input, .form-row textarea { width: 100%; padding: 8px 10px; border: 1px solid #d0d3d9;
           border-radius: 6px; font-size: 14px; font-family: inherit; }
    .form-row .hint { color: #8a8f99; font-size: 12px; margin-top: 4px; }
    .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; }
    .alert-error { background: #fde8e7; color: #c0362f; }
    .mono { font-family: Consolas, Menlo, monospace; }
    .muted { color: #8a8f99; }
    pre { background: #f5f6f8; border: 1px solid #eef0f3; border-radius: 6px; padding: 12px;
          overflow-x: auto; font-family: Consolas, Menlo, monospace; font-size: 13px; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
